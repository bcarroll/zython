name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi \
            gcc-arm-none-eabi

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_make_fat16_image.py'

      - name: Build firmware
        run: make all

      - name: Validate wrapper
        run: make validate
